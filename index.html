    :root {
      --page-bg: #070a10;

      --danger: #d92d20;
      --success: #14804a;
      --radius: 12px;
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.45);

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      min-width: 320px;
      background: var(--page-bg);
    }

    body {
      min-width: 320px;
      min-height: 100vh;
      min-height: 100svh;
      margin: 0;
      overflow-x: hidden;
      background:

      color: #fff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body.modal-open {
      overflow: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    [hidden] {
      display: none !important;
    }

    /* Página: somente o player VTurb. */
    .video-page {
      display: grid;
      min-height: 100vh;
      min-height: 100svh;
      place-items: center;
      padding: 16px;
    }

    .video-container {
      width: min(100%, 400px);
      margin-inline: auto;
    }

    /*
      O VTurb revela este contêiner pelo ID "form" no momento do pitch.
      O usuário ainda precisa clicar no botão para abrir o modal.
    */
    .vturb-hidden-content {
      display: none;
      width: 100%;
      margin-top: 18px;
      animation: revealCta 280ms ease both;
    }

    .vsl-cta-button {
      display: flex;
      width: 100%;
      min-height: 62px;
      padding: 16px 20px;
      border: 0;
      border-radius: 8px;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: #018911;
      box-shadow: 0 4px 8px 1px rgba(41, 59, 77, 0.75);
      cursor: pointer;
      font: 700 17px/1.5 Inter, ui-sans-serif, system-ui, sans-serif;
      letter-spacing: 1px;
      text-align: center;
      transition: background 160ms ease, transform 160ms ease;
      animation: ctaPulse 800ms infinite;
    }

    .vsl-cta-button:hover,
    .vsl-cta-button:focus-visible {
      background: #ff8500;
      outline: none;
    }

    .vsl-cta-button:active {
      transform: scale(0.985);
    }

    @keyframes revealCta {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes ctaPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.035); }
    }

    .form-modal {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: grid;
      padding: 18px;
      place-items: center;
      overflow-y: auto;
      background: rgba(3, 6, 11, 0.82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 180ms ease, visibility 180ms ease;
    }

    .form-modal.is-open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .form-modal__dialog {
      position: relative;
      width: min(100%, 560px);
      max-height: calc(100svh - 36px);
      overflow-y: auto;
      padding: clamp(20px, 5vw, 32px);
      border-radius: 18px;
      background: var(--modal-bg);
      box-shadow: var(--shadow);
      transform: translateY(16px) scale(0.985);
      transition: transform 180ms ease;
      scrollbar-width: thin;
    }

    .form-modal.is-open .form-modal__dialog {
      transform: translateY(0) scale(1);
    }

    .form-modal__close {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 2;
      display: grid;
      width: 38px;
      height: 38px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      place-items: center;
      color: #4b5565;
      background: transparent;
      cursor: pointer;
      font-size: 28px;
      line-height: 1;
      transition: color 150ms ease, background 150ms ease;
    }

    .form-modal__close:hover,
    .form-modal__close:focus-visible {
      color: #111827;
      background: #f0f2f5;
      outline: none;
    }

    /* Mantém o padrão estrutural do formulário informado, sem depender do GreatPages. */
    .c.e_formulario,
    .c.e_formulario fieldset {
      width: 100%;
      margin: 0;
      padding: 0;
      border: 0;
    }

    .c.e_formulario fieldset {
      display: grid;
      gap: 14px;
      padding-top: 12px;

    .gpc_campos {
      width: 100%;

    .gpc_campos-titulo.esconder,
    .gpc_campos-texto,
    .gpc_campos-hidden {
      display: none;
    }

    .gpc_campos-campo {
      position: relative;
      width: 100%;
    }

    .gpc_campo {
      display: block;
      width: 100%;
      min-height: 54px;
      padding: 0 15px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      color: var(--text);
      background: var(--field-bg);
      transition: border-color 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    select.gpc_campo {
      padding-right: 42px;
      cursor: pointer;
    }

    .gpc_campo::placeholder {
      color: #798292;
      opacity: 1;
    }

    .gpc_campo:hover {
      border-color: #c8ced6;
    }

    .gpc_campo:focus {
      border-color: var(--focus);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(33, 183, 107, 0.13);
    }

    .gpc_campo[aria-invalid="true"] {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(217, 45, 32, 0.1);
    }

    .gpc_campos-erro {
      display: none;
      margin: 6px 2px 0;
      color: var(--danger);
      font-size: 0.78rem;
      font-weight: 650;
    }

    .gpc_campos-error .gpc_campos-erro {
      display: block;
    }

    .gpc_campos-campo-opcao {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .gpc_campos-campo-opcao input[type="checkbox"] {
      flex: 0 0 auto;
      width: 18px;
      height: 18px;
      margin: 1px 0 0;
      accent-color: var(--focus);
      cursor: pointer;
    }

    .gpc_campos-campo-opcao label {
      cursor: pointer;
    }

    .gpc_botao {
      display: flex;
      width: 100%;
      min-height: 58px;
      margin-top: 4px;
      padding: 14px 18px;
      border: 0;
      border-radius: var(--radius);
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #05150d;
      background: var(--button);
      box-shadow: 0 14px 30px rgba(37, 200, 121, 0.22);
      cursor: pointer;
      font-weight: 900;
      letter-spacing: 0.01em;
      text-align: center;
      transition: background 150ms ease, transform 150ms ease, opacity 150ms ease;
    }

    .gpc_botao:hover:not(:disabled) {
      background: var(--button-hover);
      transform: translateY(-1px);
    }

    .gpc_botao:focus-visible {
      outline: 3px solid rgba(33, 183, 107, 0.28);
      outline-offset: 3px;
    }

    .gpc_botao:disabled {
      cursor: wait;
      opacity: 0.68;
    }

    .form-status {
      display: none;
      margin: 0;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 700;
      line-height: 1.4;
      text-align: center;
    }

    .form-status.is-error {
      display: block;
      color: #9f1f17;
      background: #fff0ef;
    }

    .form-status.is-success {
      display: block;
      color: var(--success);
      background: #eaf8f1;
    }

    .spinner {
      display: none;
      width: 19px;
      height: 19px;
      border: 2px solid rgba(5, 21, 13, 0.28);
      border-top-color: #05150d;
      border-radius: 50%;
      animation: spin 650ms linear infinite;
    }

    .gpc_botao.is-loading .spinner {
      display: block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .honeypot {
      position: absolute !important;
      left: -9999px !important;
      width: 1px !important;
      height: 1px !important;
      overflow: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }

    @media (max-width: 600px) {
      .form-modal {
        padding: 0;
        place-items: end center;
      }

      .form-modal__dialog {
        width: 100%;
        max-height: 94svh;
        padding: 26px 18px calc(20px + env(safe-area-inset-bottom));
        border-radius: 20px 20px 0 0;
        transform: translateY(100%);
      }

      .form-modal.is-open .form-modal__dialog {
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

        });
      }

      function generateEventId() {
        if (window.crypto && typeof window.crypto.randomUUID === 'function') {
          return window.crypto.randomUUID();
        }

        return `evt_${Date.now()}_${Math.random().toString(16).slice(2)}`;
      }

      function maskPhone(value) {
        const digits = String(value || '').replace(/\D/g, '').slice(0, 11);

        if (digits.length <= 2) return digits;
        if (digits.length <= 6) return `(${digits.slice(0, 2)}) ${digits.slice(2)}`;
        if (digits.length <= 10) {
          return `(${digits.slice(0, 2)}) ${digits.slice(2, 6)}-${digits.slice(6)}`;
        }

        return `(${digits.slice(0, 2)}) ${digits.slice(2, 7)}-${digits.slice(7)}`;
      }

      function normalizePhoneBR(value) {
        const digits = String(value || '').replace(/\D/g, '');
        return digits.startsWith('55') ? digits : `55${digits}`;
      }

      function setStatus(message = '', type = '') {
        formStatus.textContent = message;
        formStatus.className = 'form-status';

        if (type) {
          formStatus.classList.add(`is-${type}`);
        }
      }

      function setLoading(isLoading) {
        submitButton.disabled = isLoading;
        submitButton.classList.toggle('is-loading', isLoading);
        submitButton.setAttribute('aria-busy', String(isLoading));
      }

      function getFocusableElements() {
        return Array.from(
          dialog.querySelectorAll(
            'button:not([disabled]), input:not([disabled]):not([type="hidden"]), select:not([disabled]), [href], [tabindex]:not([tabindex="-1"])'
          )
        ).filter((element) => element.offsetParent !== null);
      }

      function isCtaVisible() {
        const styles = window.getComputedStyle(ctaContainer);
        return styles.display !== 'none' && styles.visibility !== 'hidden';
      }

      function openModal(source = 'cta_button') {
        if (modal.classList.contains('is-open')) return;

        lastFocusedElement = document.activeElement;
        modal.classList.add('is-open');
        modal.setAttribute('aria-hidden', 'false');
        document.body.classList.add('modal-open');

        pushEvent('vsl_form_opened', { open_source: source });
        window.setTimeout(() => firstInput.focus(), 180);
      }

      function closeModal() {
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('modal-open');

        if (lastFocusedElement && typeof lastFocusedElement.focus === 'function') {
          lastFocusedElement.focus();
        }
      }

      function trackPitchWhenCtaAppears() {
        if (!pitchTracked && isCtaVisible()) {
          pitchTracked = true;
          pushEvent('vsl_pitch_reached', { reveal_source: 'vturb_hidden_content' });
          pushEvent('vsl_cta_revealed', { reveal_source: 'vturb_hidden_content' });
        }
      }

      function observeVturbContentReveal() {
        const observer = new MutationObserver(trackPitchWhenCtaAppears);

        observer.observe(ctaContainer, {
          attributes: true,
          attributeFilter: ['style', 'class', 'hidden']
        });

        trackPitchWhenCtaAppears();
      }

      function populateTrackingFields() {
        const params = new URLSearchParams(window.location.search);

        TRACKING_FIELDS.forEach((fieldName) => {
          const field = document.getElementById(fieldName);
          if (!field) return;

          const currentValue = params.get(fieldName);
          const storedValue = sessionStorage.getItem(`tracking_${fieldName}`);
          const value = currentValue || storedValue || '';

          if (currentValue) {
            sessionStorage.setItem(`tracking_${fieldName}`, currentValue);
          }

          field.value = value;
        });
      }

      function clearValidation() {
        leadForm.querySelectorAll('.gpc_campos-error').forEach((wrapper) => {
          wrapper.classList.remove('gpc_campos-error');
        });

        leadForm.querySelectorAll('[aria-invalid="true"]').forEach((field) => {
          field.removeAttribute('aria-invalid');
        });
      }

      function showValidationErrors() {
        clearValidation();

        const invalidFields = Array.from(leadForm.querySelectorAll(':invalid'));

        invalidFields.forEach((field) => {
          field.setAttribute('aria-invalid', 'true');
          field.closest('.gpc_campos')?.classList.add('gpc_campos-error');
        });

        invalidFields[0]?.focus();
      }

      function buildPayload(formData, eventId) {
        const tracking = TRACKING_FIELDS.reduce((result, fieldName) => {
          result[fieldName] = String(formData.get(fieldName) || '');
          return result;
        }, {});

        return {
          event: 'vsl_lead_generated',
          page_title: CONFIG.pageTitle,
          event_id: eventId,
          event_time: Math.floor(Date.now() / 1000),

          lead: {
            name: String(formData.get('nome') || '').trim(),
            email: String(formData.get('e-mail') || '').trim().toLowerCase(),
            phone: normalizePhoneBR(formData.get('ddd-whatsapp')),
            is_business_owner: String(formData.get('voc-dono-do-seu-negcio') || ''),
            company_segment: String(formData.get('segmento-da-empresa') || ''),
            monthly_revenue: String(formData.get('qual-o-faturamento-mensal-da-sua-empresa') || ''),
            privacy_consent: formData.has('polticas-de-privacidade')
          },

          tracking: {
            ...tracking,
            landing_page: window.location.href.split('#')[0],
            page_path: window.location.pathname,
            referrer: document.referrer || null,
            video_id: CONFIG.videoId,
            funnel: CONFIG.funnel
          },

          metadata: {
            submitted_at: new Date().toISOString(),
            language: navigator.language || 'pt-BR',
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || null,
            user_agent: navigator.userAgent,
            screen: `${window.screen.width}x${window.screen.height}`
          }
        };
      }

      async function postWithTimeout(url, payload, timeoutMs) {
        const controller = new AbortController();
        const timeout = window.setTimeout(() => controller.abort(), timeoutMs);

        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json'
            },
            body: JSON.stringify(payload),
            signal: controller.signal
          });

          if (!response.ok) {
            throw new Error(`Webhook respondeu com HTTP ${response.status}`);
          }

          return response;
        } finally {
          window.clearTimeout(timeout);
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        populateTrackingFields();
        observeVturbContentReveal();
      });

      openFormButton.addEventListener('click', () => {
        pushEvent('vsl_cta_clicked');
        openModal('cta_button');
      });

      closeButton.addEventListener('click', () => closeModal());

      modal.addEventListener('mousedown', (event) => {
        if (event.target === modal) {
          closeModal();
        }
      });

      document.addEventListener('keydown', (event) => {
        if (!modal.classList.contains('is-open')) return;

        if (event.key === 'Escape') {
          closeModal();
          return;
        }

        if (event.key !== 'Tab') return;

        const focusable = getFocusableElements();
        if (!focusable.length) return;

        const first = focusable[0];
        const last = focusable[focusable.length - 1];

        if (event.shiftKey && document.activeElement === first) {
          event.preventDefault();
          last.focus();
        } else if (!event.shiftKey && document.activeElement === last) {
          event.preventDefault();
          first.focus();
        }
      });

      phoneInput.addEventListener('input', (event) => {
        event.target.value = maskPhone(event.target.value);
      });

      leadForm.addEventListener('input', (event) => {
        const wrapper = event.target.closest('.gpc_campos');
        wrapper?.classList.remove('gpc_campos-error');
        event.target.removeAttribute('aria-invalid');

        if (!formStartedTracked) {
          pushEvent('vsl_form_started');
          formStartedTracked = true;
        }
      });

      leadForm.addEventListener('change', (event) => {
        const wrapper = event.target.closest('.gpc_campos');
        wrapper?.classList.remove('gpc_campos-error');
        event.target.removeAttribute('aria-invalid');
      });

      leadForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        setStatus();
        clearValidation();

        if (!leadForm.checkValidity()) {
          showValidationErrors();
          pushEvent('vsl_form_validation_error');
          return;
        }

        const formData = new FormData(leadForm);

        if (String(formData.get('website') || '').trim()) {
          setStatus('Enviado com sucesso!', 'success');
          return;
        }

        const eventId = generateEventId();
        const payload = buildPayload(formData, eventId);

        setLoading(true);
        pushEvent('vsl_form_submit', { event_id: eventId });

        try {
          await postWithTimeout(CONFIG.webhookUrl, payload, CONFIG.requestTimeoutMs);

          pushEvent('generate_lead', {
            event_id: eventId,
            owner_answer: payload.lead.is_business_owner,
            revenue_range: payload.lead.monthly_revenue,
            company_segment: payload.lead.company_segment
          });

          if (typeof window.fbq === 'function') {
            window.fbq('track', 'Lead', {
              content_name: CONFIG.funnel,
              revenue_range: payload.lead.monthly_revenue
            }, {
              eventID: eventId
            });
          }

          leadForm.reset();
          populateTrackingFields();
          setStatus('Enviado com sucesso!', 'success');
        } catch (error) {
          console.error('Erro ao enviar formulário:', error);

          const message = error.name === 'AbortError'
            ? 'A solicitação demorou mais que o esperado. Tente novamente.'
            : 'Não foi possível enviar agora. Tente novamente.';

          setStatus(message, 'error');
          pushEvent('vsl_form_submit_error', {
            error_type: error.name || 'unknown'
          });
        } finally {
          setLoading(false);
        }
      });
    })();
  </script>
</body>
</html>
