server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Não expõe a versão do nginx nos headers de resposta.
    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Headers de segurança aplicados a todas as respostas.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Healthcheck: usado pelo Docker HEALTHCHECK e pelo Coolify.
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Assets estáticos versionáveis com cache longo.
    # Usa `expires` (não `add_header`) para não anular a herança dos headers de
    # segurança definidos no nível do server — gotcha de add_header do nginx.
    location ~* \.(?:css|js|jpg|jpeg|png|gif|svg|webp|ico|woff2?)$ {
        expires 7d;
        try_files $uri =404;
    }

    # O HTML não deve ser cacheado agressivamente, para permitir deploy rápido.
    # `expires -1` emite Cache-Control: no-cache sem quebrar a herança de headers.
    location / {
        expires -1;
        try_files $uri $uri/ /index.html;
    }
}
